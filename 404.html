<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>

    <script>
      const oldBasePath = "/forgedjango";
      const newBaseUrl = "https://qualcomm.github.io/forgedjango";

      const currentPath = window.location.pathname;

      if (currentPath === oldBasePath || currentPath.startsWith(oldBasePath + "/")) {
        const remainingPath = currentPath.substring(oldBasePath.length);
        const newUrl = newBaseUrl + remainingPath + window.location.search + window.location.hash;
        window.location.replace(newUrl);
      } else {
        document.addEventListener("DOMContentLoaded", function () {
          document.body.innerHTML = "<h1>404</h1><p>Page not found.</p>";
        });
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
