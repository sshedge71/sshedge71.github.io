<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>

    <script>
      const oldHost = "sshedge71.github.io";
      const newBaseHost = "https://qualcomm.github.io";

      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;

      if (window.location.hostname === oldHost && path !== "/") {
        const newUrl = newBaseHost + path + search + hash;
        window.location.replace(newUrl);
      } else {
        document.addEventListener("DOMContentLoaded", function () {
          document.body.innerHTML = "<h1>404</h1><p>Page not found.</p>";
        });
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
